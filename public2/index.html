fileInput.onchange = async () => {

    const type = file.type.startsWith("video/") ? "video" : "image";

// Compress image
if(type === "image") {
        file = await compressImage(file, 800, 0.7); // maxWidth=800, quality=0.7
    }

    // الحد الأقصى للحجم
    if ((type === "image" && file.size > 5 * 1024 * 1024) || (type === "video" && file.size > 50 * 1024 * 1024)) {
        alert(type === "image" ? "Image must be <5MB" : "Video must be <50MB");
        fileInput.value = "";
        return;
    }

    handleMedia(file, type);
    fileInput.value = "";
};

// ========== IMAGE COMPRESSION ==========
function compressImage(file, maxWidth, quality) {
    return new Promise((resolve) => {
        const img = new Image();
        const reader = new FileReader();
        reader.onload = e => {
            img.src = e.target.result;
        };
        reader.onloadend = () => { };
        img.onload = () => {
            const canvas = document.createElement("canvas");
            let width = img.width;
            let height = img.height;
            if(width > maxWidth){
                height = height * (maxWidth / width);
                width = maxWidth;
            }
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext("2d");
            ctx.drawImage(img, 0, 0, width, height);
            canvas.toBlob(blob => {
                resolve(new File([blob], file.name, { type: file.type }));
            }, file.type, quality);
        };
        reader.readAsDataURL(file);
    });
}



// ================= HANDLE MEDIA FUNCTION =================
function handleMedia(file, type){
    const reader = new FileReader();
    const messages = document.getElementById("messages");

    const div = document.createElement("div");
    div.className = "message";

    let username = "You";
    let color = null;

    const now = new Date();
    let hours = now.getHours();
    let ampm = hours >= 12 ? 'PM' : 'AM';
    hours = hours % 12 || 12;
    const time = hours + ':' + now.getMinutes().toString().padStart(2,'0') + " " + ampm;

    const circle = document.createElement("div");
    circle.className = "circle";
    circle.style.background = color;

    const bubble = document.createElement("div");
    bubble.className = "bubble";

    const nameEl = document.createElement("strong");
    nameEl.innerText = username + ":";
    nameEl.style.color = color;

    const previewEl = document.createElement(type==="image"?"img":"video");
    if(type==="image"){
	    //previewEl.style.width="100%";
        previewEl.style.maxWidth="100%";
        previewEl.style.maxHeight="300px";
        previewEl.style.borderRadius="10px";
        previewEl.style.opacity="0.5";
    } else {
        previewEl.controls = true;
        previewEl.width = 200;
    }

    const timeEl = document.createElement("span");
    timeEl.style.fontSize="0.7em";
    timeEl.style.color="#ddd";
    timeEl.style.marginLeft="5px";
    timeEl.innerText = " ⏰ " + time;

    const progressCircle = document.createElement("div");
    progressCircle.className="progress-circle";
    progressCircle.innerText="0%";

    bubble.appendChild(nameEl);
    bubble.appendChild(document.createElement("br"));
    bubble.appendChild(previewEl);
    bubble.appendChild(document.createElement("br"));
    bubble.appendChild(timeEl);
    bubble.appendChild(progressCircle);

    div.appendChild(circle);
    div.appendChild(bubble);
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;

    reader.onload = (e)=>{
        previewEl.src = e.target.result;
        previewEl.onload = () => { messages.scrollTop = messages.scrollHeight; }
    };

    reader.onloadend = () => {
        const formData = new FormData();
        formData.append(type, file);
        formData.append("socketId", socket.id);

        const xhr = new XMLHttpRequest();
        xhr.upload.onprogress = (e)=>{
            if(e.lengthComputable){
                const percent = Math.round((e.loaded/e.total)*100);
                progressCircle.innerText = percent + "%";
            }
        };
        xhr.onload = ()=>{
            progressCircle.style.display="none";
            if(type==="image") previewEl.style.opacity="1";
            div.setAttribute("data-sent","true");
            messages.scrollTop = messages.scrollHeight;
        };
        xhr.onerror = ()=>{progressCircle.innerText="Error";}
        xhr.open("POST", type==="image"?"https://chat-app-xhhf.onrender.com/upload-image":"https://chat-app-xhhf.onrender.com/upload-video");
        xhr.send(formData);
    };

    reader.readAsDataURL(file);
}

function formatTime(sec){
    const minutes = Math.floor(sec / 60);
    const remainingSeconds = sec % 60;

    return String(minutes).padStart(2,'0') + ":" + String(remainingSeconds).padStart(2,'0');
}

/* EXIT CONFIRM */
window.addEventListener('beforeunload', function (e) {
    e.preventDefault();
    e.returnValue = '';
});
history.pushState({chat:true}, "", location.href);
let backConfirmActive = false;
window.addEventListener("popstate", function (e) {
    if(backConfirmActive) return;
    backConfirmActive = true;
    const leave = confirm("Are you sure you want to exit the chat?");
    if(leave){
		socket.disconnect();
        sessionStorage.removeItem("username");
        backConfirmActive = false;
        window.close();
    } else {
        history.pushState({chat:true}, "", location.href);
        backConfirmActive = false;
    }
});
